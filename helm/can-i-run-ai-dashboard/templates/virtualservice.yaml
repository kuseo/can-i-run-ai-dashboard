{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "can-i-run-ai-dashboard.virtualServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "can-i-run-ai-dashboard.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ include "can-i-run-ai-dashboard.virtualServiceHost" . | quote }}
  gateways:
    {{- if .Values.istio.virtualService.gateways }}
    {{- toYaml .Values.istio.virtualService.gateways | nindent 4 }}
    {{- else }}
    - {{ include "can-i-run-ai-dashboard.gatewayName" . }}
    {{- end }}
  http:
    - match:
        - uri:
            prefix: {{ .Values.istio.virtualService.pathPrefix | quote }}
      route:
        - destination:
            host: {{ include "can-i-run-ai-dashboard.fullname" . }}
            port:
              number: {{ .Values.service.port }}
{{- end }}
