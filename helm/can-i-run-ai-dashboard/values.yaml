replicaCount: 1

image:
  repository: can-i-run-ai-dashboard
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8501

istio:
  enabled: true
  baseDomain: fde.makina.rocks
  gateway:
    selector:
      istio: ingressgateway
    port: 80
    protocol: HTTP
  virtualService:
    subdomain: canirunai
    gateways: []
    pathPrefix: /

resources: {}

podAnnotations: {}
podLabels: {}

nameOverride: ""
fullnameOverride: ""
